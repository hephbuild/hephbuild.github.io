name: Deploy

# Build the marketing site + docs and publish to GitHub Pages. Every step runs
# inside `devenv shell` so CI and local development execute byte-identical
# commands (see devenv.nix — the install/lint/build scripts are mirrored here).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # Run every `run:` step inside `devenv shell`, so CI executes the exact same
    # environment + scripts as local development (devenv.nix). `{0}` is the step
    # script; `-e` makes bash fail fast.
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            fallback = true

      # Runs before devenv exists, so it can't use the devenv shell yet.
      - name: Install devenv.sh
        shell: bash
        run: nix profile add nixpkgs#devenv

      - name: Install dependencies
        run: install

      - name: Lint
        run: lint

      - name: Build
        run: build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
