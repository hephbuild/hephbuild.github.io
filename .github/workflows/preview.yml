name: Preview

# Build every pull request and publish it to Cloudflare Pages as a per-branch
# preview deployment, then drop the preview URL in a sticky PR comment. The
# build runs inside `devenv shell` so the preview is byte-identical to the
# production build (see deploy.yml / devenv.nix); only the publish target
# differs (Cloudflare Pages instead of GitHub Pages).
#
# Secrets from forks are withheld by GitHub, so previews only run for branches
# pushed to this repo. PRs opened from forks skip the deploy step gracefully.

on:
  pull_request:
    types: [opened, reopened, synchronize]

# One preview per PR; cancel superseded builds to save CI minutes and avoid
# racing two deploys onto the same branch alias.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    # Skip forks: they can't read the Cloudflare secrets.
    if: github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install heph
        run: sh website/static/install.sh

      - name: Generate CLI reference
        env:
          HEPH_NO_SELF_UPDATE: "1"
        run: node scripts/gen-cli-reference.mjs

      - name: Build
        run: build

      # wrangler-action brings its own wrangler, so this step runs outside the
      # devenv shell (default bash). `--branch` controls the preview alias:
      # Cloudflare serves it at https://<branch>.hephbuild.pages.dev.
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website/build
            --project-name=hephbuild
            --branch=${{ github.head_ref }}
            --commit-dirty=true

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- cloudflare-pages-preview -->';
            const body = `${marker}\n### ⚡ Cloudflare Pages preview\n\n`
              + `| | |\n|--|--|\n`
              + `| **Preview** | ${url} |\n`
              + `| **Commit** | \`${context.sha.slice(0, 7)}\` |\n`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
