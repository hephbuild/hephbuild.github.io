name: Preview cleanup

# When a PR closes (merged or not), delete every Cloudflare Pages preview
# deployment that was published for its branch, so stale previews don't pile up.
# Cloudflare has no "delete by branch" command, so we hit the API directly:
# list the project's deployments, keep the ones whose trigger branch matches
# this PR's head, and delete them.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PROJECT: hephbuild
      BRANCH: ${{ github.head_ref }}
    steps:
      - name: Delete preview deployments for branch
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT}/deployments"
          auth="Authorization: Bearer ${CF_API_TOKEN}"

          echo "Cleaning up previews for branch: ${BRANCH}"
          page=1
          found=0
          while :; do
            resp=$(curl -sf -H "$auth" "${api}?page=${page}&per_page=25")
            count=$(echo "$resp" | jq '.result | length')
            [ "$count" -eq 0 ] && break

            ids=$(echo "$resp" | jq -r --arg b "$BRANCH" \
              '.result[]
               | select(.environment == "preview")
               | select(.deployment_trigger.metadata.branch == $b)
               | .id')

            for id in $ids; do
              echo "Deleting deployment $id"
              # force=true removes aliased deployments too.
              curl -sf -X DELETE -H "$auth" "${api}/${id}?force=true" >/dev/null
              found=$((found + 1))
            done

            page=$((page + 1))
          done

          echo "Deleted ${found} deployment(s) for branch ${BRANCH}"
